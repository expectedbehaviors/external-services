{{- range .Values.services }}
{{- $ctx := dict "root" $ "service" . }}
{{- if eq (default "ClusterIP" .type) "ExternalName" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "external-services.fullname" $ctx }}
  labels:
    {{- include "external-services.labels" $ctx | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ required "externalName is required when type is ExternalName" .externalName }}
{{- else if and .addresses .ports }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "external-services.fullname" $ctx }}
  labels:
    {{- include "external-services.labels" $ctx | nindent 4 }}
spec:
  type: {{ default "ClusterIP" .type }}
  ports:
    {{- range .ports }}
    - port: {{ .port }}
      targetPort: {{ .name }}
      protocol: {{ default "TCP" .protocol }}
      name: {{ .name }}
    {{- end }}
{{- end }}
{{- end }}
